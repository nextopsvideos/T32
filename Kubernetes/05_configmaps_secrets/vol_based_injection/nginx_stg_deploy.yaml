apiVersion: apps/v1 
kind: Deployment
metadata:
  name: nginx-stg-deploy
  labels:
    app: nginx-stg
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx-stg
  template:
    metadata:
      name: nginx
      labels:
        app: nginx-stg
    spec:
      containers:
        - name: nginx  
          image: nginx           
          ports:
            - containerPort: 8000
          volumeMounts:
          - name: nginx-stg-config-vol
            mountPath: /etc/nginx/conf.d/           #/etc/nginx/conf.d/default.conf
      volumes:
      - name: nginx-stg-config-vol 
        configMap:
          name: nginx-stg-cm
---
apiVersion: v1 
kind: Service 
metadata:
  name: nginx-stg-service
  labels:
    app: nginx-stg
spec:
  selector:
    app: nginx-stg
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP