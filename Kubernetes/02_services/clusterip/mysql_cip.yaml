apiVersion: apps/v1 
kind: Deployment    #Controller
metadata:
  name: mysql-deployment
  labels:
    app: mysql
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      name: mysql-pod 
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql-main 
          image: mysql
          ports:
            - containerPort: 3306
---
apiVersion: v1 
kind: Service 
metadata:
  name: mysql-deployment-clusterip-svc
  labels:
    app: mysql
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306