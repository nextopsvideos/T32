apiVersion: apps/v1 
kind: Deployment    #Controller
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx-pod 
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx-main 
          image: nginx
          ports:
            - containerPort: 80 # == targetPort: 80
---
apiVersion: v1 
kind: Service 
metadata:
  name: nginx-deployment-clusterip-svc
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80 # == containerPort: 80