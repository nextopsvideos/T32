apiVersion: apps/v1
kind: Deployment  #Controller
metadata: 
  name: nginx-deployment
  labels:
    app: nginx 
spec: 
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata: 
      name: nginx-pod
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx-main 
          image: nginx:1.29.0 
          ports:
            - containerPort: 80