apiVersion: apps/v1
kind: Deployment  #Controller - Self Healing
metadata: 
  name: nginx-deployment
  labels:
    app: nginx
spec: 
  replicas: 5     #Replicaset
  selector:
    matchLabels:
      app: nginx
  template:
    metadata: 
      name: nginx-pod
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx-main 
          image: nginx:latest
          ports:
            - containerPort: 80      